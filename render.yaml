services:
  - type: web
    name: baionkm
    runtime: python
    # The persistent disk is only mounted at RUNTIME, so the DB download moved to the
    # start command (below). The prebuilt DB already contains the disease catalogue +
    # ClinGen, so the build-time index scripts are no longer needed here (run them as a
    # One-Off Job against the disk if you ever want to refresh them).
    buildCommand: pip install -r requirements.txt
    # download_db.py runs first, at runtime, so it writes onto the mounted disk; it
    # SKIPS when a valid DB is already there, so saved accounts/history survive deploys.
    # 1 worker keeps SQLite writes contention-free; threads still serve the long AI
    # calls concurrently. --timeout 120 because AI analysis can take 10-30s.
    startCommand: python download_db.py && gunicorn app:app --workers 1 --threads 8 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # Generated once and kept stable so login sessions survive restarts and
      # are valid across all gunicorn workers. Without this, config.py falls
      # back to a per-process random key and logins break unpredictably.
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      # Optional AI providers — the user picks Gemini / Claude / GPT in the top bar.
      # Set the matching key in the Render dashboard to enable each (leave unset to
      # disable that option).
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: UMLS_API_KEY
        sync: false
      - key: FLASK_ENV
        value: production
      # Keep the SQLite DB on the persistent disk so accounts/history survive deploys.
      - key: DB_PATH
        value: /var/data/diseaseportal.db
    # Persistent SSD: the only files that survive redeploys/restarts live under mountPath.
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
