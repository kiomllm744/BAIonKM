<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    {% include 'partials/_head_i18n.html' %}
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ code or 'Error' }} - BAIonKM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <style>
        .error-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 70vh;
            gap: 14px;
        }
        .error-code {
            font-size: 4.5rem;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .error-title { font-size: 1.4rem; font-weight: 700; color: #1f2937; }
        .error-message { color: #6b7280; max-width: 460px; }
        .error-actions { margin-top: 10px; }
    </style>
</head>
<body>
    <div class="app-container">
        {% include 'partials/_topbar.html' %}

        <main class="main-content">
            <div class="error-wrap">
                <div class="error-code">{{ code or 'Error' }}</div>
                <div class="error-title">{{ title or 'Something went wrong' }}</div>
                <p class="error-message">{{ message or 'An unexpected error occurred.' }}</p>
                <div class="error-actions">
                    <a href="/" class="btn btn-primary">
                        <i class="fas fa-arrow-left"></i> <span data-i18n="login.back">Back to Analysis</span>
                    </a>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
